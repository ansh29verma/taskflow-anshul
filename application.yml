spring:
  application:
    name: taskflow

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:taskflow}
    username: ${DB_USER:taskflow}
    password: ${DB_PASSWORD:taskflow}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

spring.lifecycle.timeout-per-shutdown-phase: 30s

app:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-very-long-random-secret-in-production-minimum-256-bits}
    expiry-hours: 24

logging:
  level:
    com.taskflow: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"